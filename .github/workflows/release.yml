#
# This runs when version tag is pushed
#

name: REL

on:
  push:
    tags: ["v[0-9]*"]

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} ${{ matrix.linux_arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: windows-11-arm
          - os: macos-latest
          - os: ubuntu-latest
            linux_arch: x86_64
          - os: ubuntu-24.04-arm
            linux_arch: aarch64
    steps:
      - uses: actions/checkout@v7
      - name: Build abi3 wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          # A single abi3 wheel built on the minimum supported version (3.10)
          # covers every later non-free-threaded CPython. setup.py selects the
          # limited ABI automatically for these interpreters.
          CIBW_BUILD: "cp310-*"
      - name: Build free-threaded wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          # The stable ABI does not cover free-threaded builds, so these get
          # regular version-specific wheels.
          CIBW_BUILD: "cp314t-*"
      - uses: actions/upload-artifact@v7.0.1
        with:
          path: ./wheelhouse/*.whl
          name: dist-wheels-${{ matrix.os }}-${{ matrix.linux_arch }}

  sdist:
    name: "Build source package"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: {python-version: "3.14"}
      - run: |
          pip install build
          python -m build --sdist
      - uses: actions/upload-artifact@v7.0.1
        with:
          path: ./dist/*.tar.gz
          name: dist-sdist

  publish:
    name: "Publish"
    runs-on: ubuntu-latest
    needs: [build_wheels, sdist]
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: "Get files"
        uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: "Install pandoc"
        run: |
          sudo -nH apt-get -u -y install pandoc
          pandoc --version

      - name: "Prepare"
        run: |
          PKG_INFO=$(tar -xzOf dist/*.tar.gz --wildcards --no-wildcards-match-slash '*/PKG-INFO')
          PACKAGE=$(echo "${PKG_INFO}" | sed -n 's/^Name: //p' | head -1)
          VERSION=$(echo "${PKG_INFO}" | sed -n 's/^Version: //p' | head -1)
          TGZ=$(basename dist/*.tar.gz)

          # default - gh:release, pypi
          # PRERELEASE -  gh:prerelease, pypi
          # DRAFT - gh:draft,prerelease, testpypi
          PRERELEASE="false"; DRAFT="false"
          case "${VERSION}" in
            *[ab]*|*rc*) PRERELEASE="true";;
            *dev*) PRERELEASE="true"; DRAFT="true";;
          esac

          test "${{github.ref}}" = "refs/tags/v${VERSION}" || { echo "ERR: tag mismatch"; exit 1; }
          test -f "dist/${TGZ}" || { echo "ERR: sdist missing"; exit 1; }
          echo "PACKAGE=${PACKAGE}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "TGZ=${TGZ}" >> $GITHUB_ENV
          echo "PRERELEASE=${PRERELEASE}" >> $GITHUB_ENV
          echo "DRAFT=${DRAFT}" >> $GITHUB_ENV
          mkdir -p tmp
          make -s shownote > tmp/note.md
          cat tmp/note.md
          ls -l dist

      - name: "Create Github release"
        env:
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
        run: |
          title="${PACKAGE} v${VERSION}"
          ghf="--notes-file=./tmp/note.md"
          if test "${DRAFT}" = "true"; then ghf="${ghf} --draft"; fi
          if test "${PRERELEASE}" = "true"; then ghf="${ghf} --prerelease"; fi
          gh release create "v${VERSION}" "dist/${TGZ}" --title="${title}" ${ghf}

      - name: "Upload to PYPI"
        if: env.DRAFT == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: "Upload to Test PYPI"
        if: env.DRAFT == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
